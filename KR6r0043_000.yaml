front:
  text: 大唐大慈恩寺三藏法師傳序垂拱四年三月十五日仰上沙門釋彥悰述恭惟釋迦氏之臨忍土也始演八正啓三寶以黜群邪之典由是佛教行焉方等一乘圓宗十地謂之大法言真筌也化城垢服濟鹿馳羊謂之小學言權旨也至於禪戒呪術厥趣萬途而滅惑利生其歸一揆是故歷代英聖仰而寶之八會之經謂之為本根其義也三轉之法謂之為末枝其義也暨夫天雨四花地現六動解其髻寶示以衣珠借一以破三攝末歸本者也付法藏傳曰聖者阿難能誦持如來所有法藏如瓶瀉水置之異器即謂釋尊一代四十九年應物逗機適時之教也逮提河輟潤堅林晦影邃旨沖宗於焉殆絶我先昆迦葉屬五棺已掩千㲲將焚痛人天眼滅蒼生莫救故召諸聖衆集結微言考繩墨以立定門即貫華而開律部據優波提舍以之為論剖析空有顯別斷常示之以因修明之以果證足以貽範當代軌訓將來歸向之徒並遵其義及王秦奉使考日光而求佛騰蘭應請策練影以通經厥後易首抽腸之賓播美於天外篆葉結鬘之奧譯粹於區中然至至神思慮者或迷其性相唯恍唯忽言談者有昧其是非況去聖既遙來教多闕殊途競軫別路揚鑣而已哉法師懸弭誕辰室表空生之應佩觽登歲心符妙德之誠以愛海無出要之津覺地有栖神之宅故削髮矯翰翔集二空異縣他山載馳千里每慨古賢之得本行本魚魯致乖痛先匠之聞疑傳疑豕亥斯惑竊惟音樂樹下必存金石之響五天竺內想具百篇之義遂發憤忘食履嶮若夷輕萬死以涉蔥河重一言而之奈苑鷲山猴沼仰勝迹以瞻奇鹿野仙城訪遺編於蠧簡春秋寒暑一十七年耳目見聞百三十國揚我皇之盛烈振彼后之權豪偃異學之高輶拔同師之巨幟名王拜首勝侶摩肩萬古風猷一人而已法師於彼國所獲大小二乘三藏梵本等總有六百五十六部並載以巨象并諸郵駿蒙霜犯雪自天祐以元亨陽苦陰淫假皇威而利涉粵以貞觀十有九祀達于上京道俗迎之闐城溢郭鏘鏘濟濟亦一期之盛也及謁見天子勞問殷勤爰命有司瞾令宣譯人百敬奉難以具言至如氏族簪纓捐親入道遊踐遠邇中外讚揚示息化以歸真同薪盡而火滅若斯之類則備乎茲傳也傳本五卷魏國西寺前沙門慧立所述立俗姓趙豳國公劉人隋起居郎司隸從事毅之子博考儒釋雅善篇章妙辨雲飛溢思泉涌加以直詞正色不憚威嚴赴水蹈火無所屈撓覩三藏之學行矚三藏之形儀鑽之仰之彌堅彌遠因修撰其事以貽終古乃削云畢慮遺諸美遂藏之地府代莫得聞爾後役思纏痾氣懸鍾漏乃顧命門徒掘以啓之將出而卒門人等哀慟荒鯁悲不自勝而此傳流離分散他所纍載搜購近乃獲全因命余以序之迫余以次之余撫己缺然拒而不應因又謂余曰佛法之事豈預俗徒況乃當仁苦為辭讓余再懷慚退沈吟久之執紙操翰汍瀾腷臆方乃參犬羊以虎豹糅瓦石以琳璆錯綜本文箋為十卷庶後之覽者無或嗤焉
