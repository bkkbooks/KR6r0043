  - {type: variant, offset: 9454, length: 411, content: 冬十二月，改洛陽宮為東都。嫌封畿之褊隘，乃東分鄭州之氾水、懷州之河陽，西廢穀＝殼【三】穀【大】，殼【宋】【元】【明】穀殼州，取【CB】【麗-CB】，可【大】取K32n1071_p0725a18X63n1244_p0519a15可宜陽、永寧、新安、澠池等縣皆隷屬焉。法師以鄉邑增貴，修表賀曰：「沙門玄奘言。竊聞鶉首錫秦，上帝兆金城之據；龜圖薦夏，中畿啟玉泉之窺。是知靈貺所基，皇猷顯屬。昌誦由其卜遠，高光所以闡期。允迪厥猷，率遵斯在。伏惟皇帝、皇后揆物裁務，懸衡撫俗。即土中之重隩，匝＝迊【宋】，遞【元】【明】匝【大】，迊【宋】，遞【元】【明】匝迊遞虞巡而駐蹕；因舊制之瑰【CB】【麗-CB】，環【大】瑰K32n1071_p0725b04環偉，儀鎬京而＝西【三】而【大】，西【宋】【元】【明】而西建郛。仍以卑宮載懷，改作勞於曩役；馭奔在念，軫居逸於晨興。自非折中華夷，均一徭輸，豈能留連聖眷，煥汗綸言。是以令下之初，山川欝其改觀；柘＝拓【三】柘【大】，拓【宋】【元】【明】柘拓制爰始，烟雲霏而動色＝色動【三】動色【大】，色動【宋】【元】【明】動色色動。飛甍日麗，馳道風清，神期肹嚮＝響【三】嚮【大】，響【宋】【元】【明】嚮響，彝倫郁穆。若賦武昌之魚，樂遷王里；爭企云亭之鶴，願奉屬車。既小晉、鄭之依，更褊劉、張之策。前王齷齪，豐、洛遞開，我后牢籠，伊、咸並建。麟宗克茂，鼎祚惟遠，自可東宴平樂，西臨建章。佇吹笙而駐壽，康＝秉【三】康【大】，秉【宋】【元】【明】康秉在藻而流詠。蕩蕩至公，巍巍罕述。（玄）＋奘【三】奘【大】，玄奘【宋】【元】【明】奘玄奘散材莫効，貽懼增深。但三川之郊，猥霑故里；千載之幸，欝為新邑。蓽門雖翳，芻命猶存；喜編轂下，匪慚關外。況光宅之慶，遐邇所同歡；聖上允安，庸微所特荷。不勝喜抃之極。謹奉表陳謝以聞。」三年春正月　駕還西京。法師亦隨歸。, 宮: '', 甲: ''}
